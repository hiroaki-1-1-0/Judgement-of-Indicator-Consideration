<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大喜利相対評価時の指標考慮の判定</title>
  <style>
    :root { --primary:#2563eb; --bg:#f6f7fb; --border:#d8dce6; --text:#1f2937; --muted:#6b7280; --header-height:57px; --page-padding:24px; --panel-gap:18px; }
    * { box-sizing:border-box; }
    html, body { height:100%; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); line-height:1.7; overflow:hidden; }
    header { background:#fff; border-bottom:1px solid var(--border); padding:14px 22px; min-height:var(--header-height); display:flex; align-items:center; }
    h1 { font-size:1.25rem; margin:0; }
    button { border:0; border-radius:10px; padding:11px 18px; cursor:pointer; font-weight:700; }
    button.primary { background:var(--primary); color:#fff; }
    button.secondary { background:#e5e7eb; color:#111827; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .screen { display:none; max-width:1280px; margin:0 auto; padding:var(--page-padding); }
    #instructionScreen.active, #completeScreen.active { max-height:calc(100vh - var(--header-height)); overflow:auto; }
    .screen.active { display:block; }
    #taskScreen.active { display:flex; height:calc(100vh - var(--header-height)); min-height:0; padding:var(--page-padding) calc(var(--panel-gap) * 2); overflow:hidden; }
    #taskScreen { max-width:none; width:100%; }
    .card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:22px; box-shadow:0 8px 22px rgba(15,23,42,.06); }
    .layout { flex:1; display:grid; grid-template-columns:minmax(0, 6fr) minmax(0, 4fr); gap:var(--panel-gap); align-items:stretch; height:100%; min-height:0; overflow:hidden; }
    .left-card { min-height:0; max-height:calc(100vh - var(--header-height) - (var(--page-padding) * 2)); display:flex; flex-direction:column; overflow:hidden; }
    .right-card { align-self:start; max-height:calc(100vh - var(--header-height) - (var(--page-padding) * 2)); overflow:auto; }
    .field { margin-bottom:18px; }
    .label { display:block; font-weight:800; margin-bottom:8px; }
    .content-box { white-space:pre-wrap; background:#f9fafb; border:1px solid var(--border); border-radius:12px; padding:14px; max-height:210px; overflow:auto; min-height:0; }
    .relative-box { white-space:normal; max-height:none; flex:1; min-height:0; }
    .left-card .field:last-child { flex:1; display:flex; flex-direction:column; margin-bottom:0; min-height:0; }
    .markdown-body { line-height:1.8; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { margin:0.6em 0 0.35em; line-height:1.35; }
    .markdown-body h1 { font-size:1.35rem; }
    .markdown-body h2 { font-size:1.2rem; }
    .markdown-body h3 { font-size:1.08rem; }
    .markdown-body h4 { font-size:1rem; }
    .markdown-body p { margin:0.45em 0; }
    .markdown-body ul, .markdown-body ol { margin:0.45em 0; padding-left:1.5em; }
    .markdown-body code { background:#eef2f7; border-radius:4px; padding:0.1em 0.3em; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .markdown-body blockquote { margin:0.6em 0; padding:0.4em 0.8em; border-left:4px solid var(--border); background:#fff; color:#374151; }
    .metric { position:relative; display:grid; grid-template-columns:minmax(0, 1fr) minmax(190px, 240px); gap:12px; align-items:center; border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:12px; background:#fbfdff; }
    .metric-title { display:flex; align-items:center; justify-content:flex-start; gap:8px; font-weight:800; }
    .metric-title-text { min-width:0; }
    .metric-help-button { flex:0 0 auto; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--border); border-radius:50%; padding:0; background:#fff; color:var(--primary); font-size:.9rem; line-height:1; font-weight:800; }
    .metric-help-button:hover, .metric-help-button:focus { border-color:var(--primary); background:#eff6ff; outline:0; }
    .knowledge-popover { display:none; position:absolute; z-index:20; top:var(--knowledge-top, 44px); left:var(--knowledge-left, 14px); width:min(320px, calc(100% - 28px)); padding:10px 12px; border:1px solid #bfdbfe; border-radius:10px; background:#eff6ff; color:#1e3a8a; font-size:.94rem; line-height:1.6; box-shadow:0 12px 28px rgba(15,23,42,.18); }
    .knowledge-popover::before { content:""; position:absolute; top:-7px; left:var(--knowledge-arrow-left, 10px); width:12px; height:12px; border-left:1px solid #bfdbfe; border-top:1px solid #bfdbfe; background:#eff6ff; transform:rotate(45deg); }
    .knowledge-popover.active { display:block; }
    .metric-select { width:100%; border:1px solid var(--border); border-radius:12px; padding:10px 12px; font:inherit; background:#fff; }
    .metric-select:required:invalid { color:var(--muted); }
    .metric-select option { color:var(--text); }
    .metric-select:focus { border-color:var(--primary); outline:3px solid rgba(37,99,235,.16); }
    textarea, input[type="text"] { width:100%; border:1px solid var(--border); border-radius:12px; padding:12px; font:inherit; background:#fff; }
    .muted { color:var(--muted); font-size:.95rem; }
    .progress { font-weight:800; margin-bottom:12px; }
    .notice { background:#eff6ff; padding:14px; border-radius:10px; }
    .error { color:#b91c1c; font-weight:700; }
    .ok { color:#047857; font-weight:700; }
    .button-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    @media (max-width: 900px) {
      body { overflow:auto; }
      #taskScreen.active { display:block; height:auto; min-height:auto; overflow:visible; }
      .layout { grid-template-columns:1fr; height:auto; min-height:auto; overflow:visible; }
      .left-card { max-height:none; overflow:visible; }
      .right-card { max-height:none; }
      .relative-box { min-height:320px; }
      .metric { grid-template-columns:1fr; align-items:stretch; }
    }
  </style>
</head>
<body>

  <main>

      <div class="layout">
        <div class="card left-card">
          <div class="progress" id="progressText"></div>

            <span class="label">大喜利のお題</span>
            <div class="content-box" id="topicBox"></div>
          </div>
          <div class="field">
            <span class="label">大喜利の回答1</span>
            <div class="content-box" id="answer1Box"></div>

  <script>
    const CHOICES = [
      { label: '考慮している', value: 1 },
      { label: '考慮していない', value: -1 },
      { label: '考慮しているか不明', value: 0 }
    ];
    const METRIC_PRIOR_KNOWLEDGE = {
      '語彙的新規性の低さ': '回答の語彙がお題の語彙と似たようなものであることを指します。',
      '不一致の解消度合い': '回答がお題の予想外のものであり、かつ納得感を与えるものであることを指します。',
      '比喩の使用度': '回答で比喩を使用する度合いを指します。',
      '連想距離の遠さ': '回答がお題から連想しにくいことを指します。',
      'ボケの面白さ': '冗談や間違いや面白い動作などの要素を回答に含めることによって引き起こされる笑いの面白さを指します。',
      '曖昧さの活用度': 'お題の曖昧さを回答で活かした度合いを示します。',
      '無害な違反の度合い': '遊びや冗談として許容できる、傷つくほどではない「無害」と、道徳、規範、論理、物理的なルールが破られている「違反」を両立できている度合いを指します。',
      '視点の転換度合い': 'お題の視点から回答の視点への転換の度合いを指します。',
      '特殊文字の少なさ': '「！」や「？」などの特殊文字の少なさを指します。',
      'お題に対する回答の短さ': 'お題に対して回答が短いことを指します。',
      '文字数の少なさ': '回答の文字数の少なさを指します。'
    };
    let currentIndex = 0;
    let workerName = '';
    const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const savedRatings = {};

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (el) { el.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function escapeHtml(text) {
      return String(text || '').replace(/[&<>"']/g, function (m) {
        return {'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[m];
      });
    }

    function inlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/__([^_]+)__/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }

    function markdownToHtml(markdown) {
      const lines = String(markdown || '')
        .replace(/\\n/g, '\n')
        .replace(/\r\n?/g, '\n')
        .split('\n');
      let html = '';
      let inList = false;
      let inBlockquote = false;
      function closeList() { if (inList) { html += '</ul>'; inList = false; } }
      function closeBlockquote() { if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; } }
      lines.forEach(function (line) {
        const trimmed = line.trim();
        if (trimmed === '') { closeList(); closeBlockquote(); return; }
        if (/^---+$/.test(trimmed)) { closeList(); closeBlockquote(); html += '<hr>'; return; }
        if (/^#### +/.test(trimmed)) { closeList(); closeBlockquote(); html += '<h4>' + inlineMarkdown(trimmed.replace(/^#### +/, '')) + '</h4>'; return; }
        if (/^### +/.test(trimmed)) { closeList(); closeBlockquote(); html += '<h3>' + inlineMarkdown(trimmed.replace(/^### +/, '')) + '</h3>'; return; }
        if (/^## +/.test(trimmed)) { closeList(); closeBlockquote(); html += '<h2>' + inlineMarkdown(trimmed.replace(/^## +/, '')) + '</h2>'; return; }
        if (/^# +/.test(trimmed)) { closeList(); closeBlockquote(); html += '<h1>' + inlineMarkdown(trimmed.replace(/^# +/, '')) + '</h1>'; return; }
        if (/^[-*] +/.test(trimmed)) {
          closeBlockquote();
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + inlineMarkdown(trimmed.replace(/^[-*] +/, '')) + '</li>';
          return;
        }
        if (/^> ?/.test(trimmed)) {
          closeList();
          if (!inBlockquote) { html += '<blockquote>'; }
          else { html += '<br>'; }
          inBlockquote = true;
          html += inlineMarkdown(trimmed.replace(/^> ?/, ''));
          return;
        }
        closeList();
        closeBlockquote();
        html += '<p>' + inlineMarkdown(line) + '</p>';
      });
      closeList();
      closeBlockquote();
      return html;
    }

    function startTask() {
      const name = document.getElementById('workerName').value.trim();
      if (!name) {
        document.getElementById('nameError').textContent = '名前（ランサーズ表示名）を入力してください。';
        return;
      }
      workerName = name;
      showScreen('taskScreen');
      renderItem();
    }

    function resetTaskScrollPositions() {
      const scrollTargets = [
        document.getElementById('relativeTextBox'),
        document.querySelector('.right-card')
      ];
      scrollTargets.forEach(function (el) {
        if (el) el.scrollTop = 0;
      });
    }

    function closeMetricKnowledgePopovers(exceptPopover) {
      document.querySelectorAll('.knowledge-popover.active').forEach(function (popover) {
        if (popover === exceptPopover) return;
        popover.classList.remove('active');
        const button = document.querySelector('[aria-controls="' + popover.id + '"]');
        if (button) button.setAttribute('aria-expanded', 'false');
      });
    }

    function positionMetricKnowledgePopover(button, popover) {
      const block = button.closest('.metric');
      if (!block) return;
      const blockRect = block.getBoundingClientRect();
      const buttonRect = button.getBoundingClientRect();
      const popoverWidth = Math.min(320, block.clientWidth - 28);
      const buttonCenter = buttonRect.left - blockRect.left + (buttonRect.width / 2);
      const popoverLeft = Math.max(14, Math.min(buttonCenter - (popoverWidth / 2), block.clientWidth - popoverWidth - 14));
      const arrowLeft = Math.max(10, Math.min(buttonCenter - popoverLeft - 6, popoverWidth - 22));

      popover.style.setProperty('--knowledge-top', (buttonRect.bottom - blockRect.top + 8) + 'px');
      popover.style.setProperty('--knowledge-left', popoverLeft + 'px');
      popover.style.setProperty('--knowledge-arrow-left', arrowLeft + 'px');
    }

    function renderItem() {
      const item = TASK_ITEMS[currentIndex];
      document.getElementById('progressText').textContent = '項目 ' + (currentIndex + 1) + ' / ' + TASK_ITEMS.length;
      document.getElementById('topicBox').textContent = item.topic;
      document.getElementById('answer1Box').textContent = item.answer1;
      document.getElementById('answer2Box').textContent = item.answer2;
      document.getElementById('relativeTextBox').innerHTML = markdownToHtml(item.relativeText);
      document.getElementById('formError').textContent = '';
      document.getElementById('saveStatus').textContent = '';
      document.getElementById('prevButton').disabled = currentIndex === 0;
      buildMetricForm(item.id);
      resetTaskScrollPositions();
    }

    function buildMetricForm(itemId) {
      const container = document.getElementById('metricsForm');
      container.innerHTML = '';
      const existing = savedRatings[itemId] || {};
      METRICS.forEach(function (metric, metricIndex) {
        const block = document.createElement('div');
        block.className = 'metric';
        const title = document.createElement('div');
        title.className = 'metric-title';
        const titleText = document.createElement('span');
        titleText.className = 'metric-title-text';
        titleText.textContent = metric;
        const helpButton = document.createElement('button');
        helpButton.type = 'button';
        helpButton.className = 'metric-help-button';
        helpButton.textContent = '?';
        helpButton.setAttribute('aria-label', metric + 'の事前知識を表示');
        helpButton.setAttribute('aria-expanded', 'false');
        helpButton.setAttribute('aria-controls', 'knowledge_' + metricIndex);
        title.appendChild(titleText);
        title.appendChild(helpButton);
        block.appendChild(title);
        const knowledge = document.createElement('div');
        knowledge.className = 'knowledge-popover';
        knowledge.id = 'knowledge_' + metricIndex;
        knowledge.textContent = METRIC_PRIOR_KNOWLEDGE[metric] || 'この評価指標の事前知識は登録されていません。';
        helpButton.addEventListener('click', function (event) {
          event.stopPropagation();
          closeMetricKnowledgePopovers(knowledge);
          const isOpen = knowledge.classList.toggle('active');
          helpButton.setAttribute('aria-expanded', String(isOpen));
          if (isOpen) positionMetricKnowledgePopover(helpButton, knowledge);
        });
        knowledge.addEventListener('click', function (event) {
          event.stopPropagation();
        });
        block.appendChild(knowledge);
        const select = document.createElement('select');
        select.className = 'metric-select';
        select.name = 'metric_' + metricIndex;
        select.dataset.metric = metric;
        select.required = true;
        select.setAttribute('aria-label', metric + 'の考慮判定');
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '選択してください';
        select.appendChild(placeholder);
        CHOICES.forEach(function (choice) {
          const option = document.createElement('option');
          option.value = String(choice.value);
          option.textContent = choice.label;
          option.selected = Number(existing[metric]) === choice.value;
          select.appendChild(option);
        });
        block.appendChild(select);
        container.appendChild(block);
      });
    }

    function collectRatings() {
      const ratings = {};
      METRICS.forEach(function (metric, metricIndex) {
        const select = document.querySelector('select[name="metric_' + metricIndex + '"]');
        if (select && select.value !== '') ratings[metric] = Number(select.value);
      });
      return ratings;
    }

    function validateRatings(ratings) {
      const missing = METRICS.filter(function (metric) { return ratings[metric] === undefined || ratings[metric] === null || ratings[metric] === ''; });
      return missing;
    }

    function saveCurrent() {
      const item = TASK_ITEMS[currentIndex];
      const ratings = collectRatings();
      const missing = validateRatings(ratings);
      if (missing.length > 0) {
        document.getElementById('formError').textContent = '未選択の項目があります: ' + missing.join('、');
        return;
      }
      savedRatings[item.id] = ratings;
      document.getElementById('formError').textContent = '';
      document.getElementById('saveStatus').textContent = '保存中です...';
      document.getElementById('saveButton').disabled = true;

      const payload = {
        sessionId: sessionId,
        workerName: workerName,
        itemId: item.id,
        itemIndex: item.index,
        topic: item.topic,
        answer1: item.answer1,
        answer2: item.answer2,
        relativeText: item.relativeText,
        ratings: ratings,
        userAgent: navigator.userAgent
      };

      google.script.run
        .withSuccessHandler(function () {
          document.getElementById('saveButton').disabled = false;
          if (currentIndex + 1 >= TASK_ITEMS.length) {
            showScreen('completeScreen');
          } else {
            currentIndex += 1;
            renderItem();
          }
        })
        .withFailureHandler(function (err) {
          document.getElementById('saveButton').disabled = false;
          document.getElementById('saveStatus').textContent = '';
          document.getElementById('formError').textContent = '保存に失敗しました: ' + (err && err.message ? err.message : err);
        })
        .saveResponse(payload);
    }

    function prevItem() {
      if (currentIndex === 0) return;
      savedRatings[TASK_ITEMS[currentIndex].id] = collectRatings();
      currentIndex -= 1;
      renderItem();
    }

    document.addEventListener('click', function () {
      closeMetricKnowledgePopovers();
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') closeMetricKnowledgePopovers();
    });

    window.addEventListener('resize', function () {
      document.querySelectorAll('.knowledge-popover.active').forEach(function (popover) {
        const button = document.querySelector('[aria-controls="' + popover.id + '"]');
        if (button) positionMetricKnowledgePopover(button, popover);
      });
    });
  </script>
</body>
