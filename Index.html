<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大喜利 考慮判定</title>
  <style>
    :root { --primary:#2563eb; --bg:#f6f7fb; --border:#d8dce6; --text:#1f2937; --muted:#6b7280; --header-height:57px; --page-padding:24px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); line-height:1.7; }
    header { background:#fff; border-bottom:1px solid var(--border); padding:14px 22px; min-height:var(--header-height); display:flex; align-items:center; }
    h1 { font-size:1.25rem; margin:0; }
    button { border:0; border-radius:10px; padding:11px 18px; cursor:pointer; font-weight:700; }
    button.primary { background:var(--primary); color:#fff; }
    button.secondary { background:#e5e7eb; color:#111827; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .screen { display:none; max-width:1280px; margin:0 auto; padding:var(--page-padding); }
    .screen.active { display:block; }
    #taskScreen.active { display:flex; min-height:calc(100vh - var(--header-height)); }
    .card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:22px; box-shadow:0 8px 22px rgba(15,23,42,.06); }
    .layout { flex:1; display:grid; grid-template-columns:minmax(0, 1.1fr) minmax(390px, .9fr); gap:20px; align-items:stretch; min-height:calc(100vh - var(--header-height) - (var(--page-padding) * 2)); }
    .left-card { min-height:100%; display:flex; flex-direction:column; }
    .right-card { align-self:start; max-height:calc(100vh - var(--header-height) - (var(--page-padding) * 2)); overflow:auto; }
    .field { margin-bottom:18px; }
    .label { display:block; font-weight:800; margin-bottom:8px; }
    .content-box { white-space:pre-wrap; background:#f9fafb; border:1px solid var(--border); border-radius:12px; padding:14px; max-height:210px; overflow:auto; }
    .relative-box { white-space:normal; max-height:none; flex:1; min-height:420px; }
    .left-card .field:last-child { flex:1; display:flex; flex-direction:column; margin-bottom:0; }
    .markdown-body { line-height:1.8; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin:0.6em 0 0.35em; line-height:1.35; }
    .markdown-body h1 { font-size:1.35rem; }
    .markdown-body h2 { font-size:1.2rem; }
    .markdown-body h3 { font-size:1.08rem; }
    .markdown-body p { margin:0.45em 0; }
    .markdown-body ul, .markdown-body ol { margin:0.45em 0; padding-left:1.5em; }
    .markdown-body code { background:#eef2f7; border-radius:4px; padding:0.1em 0.3em; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .markdown-body blockquote { margin:0.6em 0; padding:0.4em 0.8em; border-left:4px solid var(--border); background:#fff; color:#374151; }
    .metric { border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:12px; background:#fbfdff; }
    .metric-title { font-weight:800; margin-bottom:8px; }
    .radio-group { display:grid; gap:8px; }
    .radio-option { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--border); border-radius:12px; background:#fff; cursor:pointer; }
    .radio-option:has(input:checked) { border-color:var(--primary); background:#eff6ff; }
    textarea, input[type="text"] { width:100%; border:1px solid var(--border); border-radius:12px; padding:12px; font:inherit; background:#fff; }
    .muted { color:var(--muted); font-size:.95rem; }
    .progress { font-weight:800; margin-bottom:12px; }
    .notice { background:#eff6ff; border-left:5px solid var(--primary); padding:14px; border-radius:10px; }
    .error { color:#b91c1c; font-weight:700; }
    .ok { color:#047857; font-weight:700; }
    .button-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    @media (max-width: 900px) {
      #taskScreen.active { display:block; min-height:auto; }
      .layout { grid-template-columns:1fr; min-height:auto; }
      .right-card { max-height:none; }
      .relative-box { min-height:320px; }
    }
  </style>
</head>
<body>
  <header><h1>大喜利 考慮判定</h1></header>

  <main>
    <section id="instructionScreen" class="screen active">
      <div class="card">
        <h2>作業内容</h2>
        <p class="notice">左側に表示される「大喜利のお題」「大喜利の回答1」「大喜利の回答2」「相対評価時の文章」を読み、右側の各指標が相対評価時の文章で考慮されているかを判定してください。</p>
        <p>各指標について「考慮している」「考慮していない」「考慮しているか不明」のいずれかを必ず選択してください。</p>
        <h3 class="label" id="workerNameHeading">名前（ランサーズ表示名）</h3>
        <input type="text" id="workerName" aria-labelledby="workerNameHeading" autocomplete="name" placeholder="例：山田太郎">
        <p id="nameError" class="error"></p>
        <button class="primary" onclick="startTask()">判定へ</button>
      </div>
    </section>

    <section id="taskScreen" class="screen">
      <div class="layout">
        <div class="card left-card">
          <div class="progress" id="progressText"></div>
          <div class="field">
            <span class="label">大喜利のお題</span>
            <div class="content-box" id="topicBox"></div>
          </div>
          <div class="field">
            <span class="label">大喜利の回答1</span>
            <div class="content-box" id="answer1Box"></div>
          </div>
          <div class="field">
            <span class="label">大喜利の回答2</span>
            <div class="content-box" id="answer2Box"></div>
          </div>
          <div class="field">
            <span class="label">相対評価時の文章</span>
            <div class="content-box relative-box markdown-body" id="relativeTextBox"></div>
          </div>
        </div>

        <div class="card right-card">
          <h2>考慮判定</h2>
          <p class="muted">すべての項目を選択すると保存できます。</p>
          <div id="metricsForm"></div>
          <p id="formError" class="error"></p>
          <p id="saveStatus" class="ok"></p>
          <div class="button-row">
            <button class="secondary" id="prevButton" onclick="prevItem()">戻る</button>
            <button class="primary" id="saveButton" onclick="saveCurrent()">保存して次へ</button>
          </div>
        </div>
      </div>
    </section>

    <section id="completeScreen" class="screen">
      <div class="card">
        <h2>完了しました</h2>
        <p class="ok">すべての判定が保存されました。ご協力ありがとうございました。</p>
      </div>
    </section>
  </main>

  <?!= include('Data'); ?>

  <script>
    const CHOICES = [
      { label: '考慮している', value: 1 },
      { label: '考慮していない', value: -1 },
      { label: '考慮しているか不明', value: 0 }
    ];
    let currentIndex = 0;
    let workerName = '';
    const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const savedRatings = {};

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (el) { el.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function escapeHtml(text) {
      return String(text || '').replace(/[&<>"']/g, function (m) {
        return {'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[m];
      });
    }

    function inlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/__([^_]+)__/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }

    function markdownToHtml(markdown) {
      const lines = String(markdown || '').replace(/\r\n?/g, '\n').split('\n');
      let html = '';
      let inList = false;
      function closeList() { if (inList) { html += '</ul>'; inList = false; } }
      lines.forEach(function (line) {
        const trimmed = line.trim();
        if (trimmed === '') { closeList(); return; }
        if (/^---+$/.test(trimmed)) { closeList(); html += '<hr>'; return; }
        if (/^### +/.test(trimmed)) { closeList(); html += '<h3>' + inlineMarkdown(trimmed.replace(/^### +/, '')) + '</h3>'; return; }
        if (/^## +/.test(trimmed)) { closeList(); html += '<h2>' + inlineMarkdown(trimmed.replace(/^## +/, '')) + '</h2>'; return; }
        if (/^# +/.test(trimmed)) { closeList(); html += '<h1>' + inlineMarkdown(trimmed.replace(/^# +/, '')) + '</h1>'; return; }
        if (/^[-*] +/.test(trimmed)) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + inlineMarkdown(trimmed.replace(/^[-*] +/, '')) + '</li>';
          return;
        }
        if (/^> ?/.test(trimmed)) { closeList(); html += '<blockquote>' + inlineMarkdown(trimmed.replace(/^> ?/, '')) + '</blockquote>'; return; }
        closeList();
        html += '<p>' + inlineMarkdown(line) + '</p>';
      });
      closeList();
      return html;
    }

    function startTask() {
      const name = document.getElementById('workerName').value.trim();
      if (!name) {
        document.getElementById('nameError').textContent = '名前（ランサーズ表示名）を入力してください。';
        return;
      }
      workerName = name;
      showScreen('taskScreen');
      renderItem();
    }

    function renderItem() {
      const item = TASK_ITEMS[currentIndex];
      document.getElementById('progressText').textContent = '項目 ' + (currentIndex + 1) + ' / ' + TASK_ITEMS.length;
      document.getElementById('topicBox').textContent = item.topic;
      document.getElementById('answer1Box').textContent = item.answer1;
      document.getElementById('answer2Box').textContent = item.answer2;
      document.getElementById('relativeTextBox').innerHTML = markdownToHtml(item.relativeText);
      document.getElementById('formError').textContent = '';
      document.getElementById('saveStatus').textContent = '';
      document.getElementById('prevButton').disabled = currentIndex === 0;
      buildMetricForm(item.id);
    }

    function buildMetricForm(itemId) {
      const container = document.getElementById('metricsForm');
      container.innerHTML = '';
      const existing = savedRatings[itemId] || {};
      METRICS.forEach(function (metric, metricIndex) {
        const block = document.createElement('div');
        block.className = 'metric';
        const title = document.createElement('div');
        title.className = 'metric-title';
        title.textContent = metric;
        block.appendChild(title);
        const group = document.createElement('div');
        group.className = 'radio-group';
        CHOICES.forEach(function (choice) {
          const id = 'm_' + metricIndex + '_' + choice.value;
          const label = document.createElement('label');
          label.className = 'radio-option';
          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'metric_' + metricIndex;
          input.value = String(choice.value);
          input.dataset.metric = metric;
          input.checked = Number(existing[metric]) === choice.value;
          const span = document.createElement('span');
          span.textContent = choice.label;
          label.appendChild(input);
          label.appendChild(span);
          group.appendChild(label);
        });
        block.appendChild(group);
        container.appendChild(block);
      });
    }

    function collectRatings() {
      const ratings = {};
      METRICS.forEach(function (metric, metricIndex) {
        const checked = document.querySelector('input[name="metric_' + metricIndex + '"]:checked');
        if (checked) ratings[metric] = Number(checked.value);
      });
      return ratings;
    }

    function validateRatings(ratings) {
      const missing = METRICS.filter(function (metric) { return ratings[metric] === undefined || ratings[metric] === null || ratings[metric] === ''; });
      return missing;
    }

    function saveCurrent() {
      const item = TASK_ITEMS[currentIndex];
      const ratings = collectRatings();
      const missing = validateRatings(ratings);
      if (missing.length > 0) {
        document.getElementById('formError').textContent = '未選択の項目があります: ' + missing.join('、');
        return;
      }
      savedRatings[item.id] = ratings;
      document.getElementById('formError').textContent = '';
      document.getElementById('saveStatus').textContent = '保存中です...';
      document.getElementById('saveButton').disabled = true;

      const payload = {
        sessionId: sessionId,
        workerName: workerName,
        itemId: item.id,
        itemIndex: item.index,
        topic: item.topic,
        answer1: item.answer1,
        answer2: item.answer2,
        relativeText: item.relativeText,
        ratings: ratings,
        userAgent: navigator.userAgent
      };

      google.script.run
        .withSuccessHandler(function () {
          document.getElementById('saveButton').disabled = false;
          if (currentIndex + 1 >= TASK_ITEMS.length) {
            showScreen('completeScreen');
          } else {
            currentIndex += 1;
            renderItem();
          }
        })
        .withFailureHandler(function (err) {
          document.getElementById('saveButton').disabled = false;
          document.getElementById('saveStatus').textContent = '';
          document.getElementById('formError').textContent = '保存に失敗しました: ' + (err && err.message ? err.message : err);
        })
        .saveResponse(payload);
    }

    function prevItem() {
      if (currentIndex === 0) return;
      savedRatings[TASK_ITEMS[currentIndex].id] = collectRatings();
      currentIndex -= 1;
      renderItem();
    }
  </script>
</body>
</html>
